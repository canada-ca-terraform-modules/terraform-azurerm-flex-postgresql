repos:
- repo: https://github.com/antonbabenko/pre-commit-terraform
  rev: v1.103.0
  hooks:
      - id: terraform_fmt
      - id: terraform_validate
        exclude: examples*
      - id: terraform_tflint
      - id: terraform_docs
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    - id: check-merge-conflict
